<!DOCTYPE html>
<html>
    <head>
        <meta name = "viewport" content="with=device-width, initial-scale=1.0">
            <title>Valorant Esports Portal</title>
            <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
            <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,600;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
    </head>
    <body>
        <section class="teams-page">
            <nav>
                <a href="{{ url_for('index') }}"><img src="{{url_for('static', filename='images/Valorant_logo.svg') }}"></a>
                <div class="nav-links" id="navLinks">
                    <i class="fa fa-times" onclick="hideMenu()"></i>
                    <ul>
                        <li><a href="{{ url_for('index') }}">HOME</a></li>
                        <li><a href="{{ url_for('teams') }}">TEAMS</a></li>
                        <li><a href="{{ url_for('matches') }}">MATCHES</a></li>
                        <li><a href="{{ url_for('standings') }}">STANDINGS</a></li>
                        <li><a href="{{ url_for('players') }}">PLAYERS</a></li>
                        <li><a href="{{ url_for('admin') }}">DATA MANAGEMENT</a></li>
                    </ul>
                </div>
                <i class="fa fa-bars" onclick="showMenu()"></i>
            </nav>


            <div class=search-bar-item>
                <div class="text-box">
                    <h1>Team Matches</h1>
                    <p>Search a team below to find their matches.</p>
                </div> 
                <div class="search-box">
                    <input type="text" id="team_input" placeholder="Search Team Name...">
                    <div class="search-icon">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="cancel-icon">
                        <i class="fas fa-times"></i>
                    </div>
                </div>
                <div class="filters-container">
                    <div class="region-container">
                        <label for="region">Region</label>
                        <select id="region-filter">
                            <option value="All">All Regions</option>
                            <option value="International">International</option>
                            <option value="Local">Local</option>
                        </select>
                    </div>

                    <div class="date-container">
                        <div class="date-group">
                            <label for="start-date">Start:</label>
                            <input type="date" id="start-date">
                        </div>
                        <div class="date-group">
                            <label for="end-date">End:</label>
                            <input type="date" id="end-date">
                        </div>
                    </div>
                    <div class="toggle-container">
                        <label for="win">Win</label>
                        <input type="checkbox" id="win-toggle">
                    </div>
                </div>
                    <ul id="suggestions" class="suggestions-list"></ul>
                </div>
            </div>

            <div class="team-table-container">
                <div id="team-table"></div>
            </div>
        </section>

    <!----- Java Script for Toggle Menu ----->
        <script>
            var navLinks = document.getElementById("navLinks");
            function showMenu(){
                navLinks.style.right = "-50px";
            }
            function hideMenu(){
                navLinks.style.right = "-200px";
            }

        </script>
    <!----- Java Script for Team Search ----->
        <script>
            const searchBox = document.querySelector(".search-box");
            const searchButton = document.querySelector(".search-icon");
            const cancelButton = document.querySelector(".cancel-icon");
            const searchInput = document.getElementById("team_input");
            const suggestions = document.getElementById("suggestions");
            const teamTableDiv = document.getElementById("team-table");
            const regionFilter = document.getElementById("region-filter");
            const startDateFilter = document.getElementById("start-date");
            const endDateFilter = document.getElementById("end-date");
            const winToggle = document.getElementById("win-toggle");

            searchButton.onclick =()=>{
                searchBox.classList.add("active");
                searchButton.classList.add("active");
                searchInput.classList.add("active");
                cancelButton.classList.add("active");
                searchInput.focus();

                if (searchInput.value != "") {
                    // searchData.classList.remove("active");
                    fetchMatchesTable();
                    suggestions.classList.remove("active");
                }
            }
            cancelButton.onclick =()=> {
                searchBox.classList.remove("active");
                searchButton.classList.remove("active");
                searchInput.classList.remove("active");
                cancelButton.classList.remove("active");
                suggestions.classList.remove("active");
                searchInput.value = "";
                teamTableDiv.innerHTML = "";
            }

            // Function to fetch all teams for autocomplete
            async function fetchTeams() {
                try {
                    const res = await fetch(`http://localhost:3000/teams`);
                    if (!res.ok) throw new Error("Failed to fetch teams.");
                    const data = await res.json();
                    return data.map(t => t.team_name);
                } catch (err) {
                    console.error(err);
                    return [];
                }
            }

            // Filter and show suggestions
            async function showSuggestions() {
                // Fetch team list
                const allTeams = await fetchTeams();

                // Set query for team
                const query = searchInput.value.toLowerCase();
                suggestions.innerHTML = "";
                
                // If empty query, remove active status and return
                if (!query) {
                    suggestions.classList.remove("active");
                    return;
                }
                
                // Find top 5 teams that match the input string
                const matches = allTeams.filter(name => name.toLowerCase().includes(query)).slice(0, 5)

                matches.forEach(name => {
                    const li = document.createElement("li");
                    li.textContent = name;
                    li.classList.add("suggestion-item");
                    // On click, load table
                    li.addEventListener("click", () => {
                        searchInput.value = name;
                        suggestions.classList.remove("active");
                        fetchMatchesTable();
                    });
                    suggestions.appendChild(li);
                });

                if (matches.length > 0) {
                    suggestions.classList.add("active");
                } else {
                    suggestions.classList.remove("active");
                }
            }

            // Fetch matches for team and dynamically load table
            async function fetchMatchesTable() {
                const region = regionFilter.value;
                const startDate = startDateFilter.value;
                const endDate = endDateFilter.value;
                const isWin = winToggle.checked;
                const teamName = searchInput.value;
                const url = `http://localhost:3000/team/matches/filtered?teamName=${encodeURIComponent(teamName)}&regionName=${encodeURIComponent(region)}&win=${encodeURIComponent(isWin)}&startDate=${encodeURIComponent(startDate)}&endDate=${encodeURIComponent(endDate)}`;

                if (!teamName) return;

                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error("Could not find matches.");
                    const data = await res.json();

                    // Display stats
                    let htmlContent = `<h2>Search Results`;
                    
                        if (data && data.length > 0) {
                            // Get unique column headers
                            const headers = Object.keys(data[0])

                            // Build table HTML
                            htmlContent += '<div class="matches-table-wrapper">';
                            htmlContent += '<table>'
                            
                            // Table header
                            htmlContent += '<thead><tr>';
                            headers.forEach(header => {
                                // Clean up headers
                                const displayHeader = header.split('_').map(word => word.charAt().toUpperCase() + word.slice(1)).join(' ');
                                htmlContent += `<th>${displayHeader}</th>`;
                            });
                            htmlContent += '</tr></thead>';

                            // Table Body
                            htmlContent += '<tbody>';
                            data.forEach(dataRow => {
                                htmlContent += '<tr>';
                                // Loop through columns for each row
                                headers.forEach(header => {
                                    // Output data content for each cell
                                    htmlContent += `<td>${dataRow[header]}</td>`;
                                });
                                htmlContent += '</tr>';
                            });
                            // Close final wrappers
                            htmlContent += '</tbody>';
                            htmlContent += '</table>';
                            htmlContent += '</div>';
                        }
                    else {
                        htmlContent += '<p>No matches available for these filters.</p>';
                    }
                    teamTableDiv.innerHTML = htmlContent;

                } catch (err) {
                    console.error(err);
                    teamTableDiv.innerHTML = `<p style="color:red;">${err.message}</p>`;
                }
            }

            // Add filter event listeners
            regionFilter.addEventListener("change", fetchMatchesTable);
            startDateFilter.addEventListener("change", fetchMatchesTable);
            endDateFilter.addEventListener("change", fetchMatchesTable);
            winToggle.addEventListener("change", fetchMatchesTable);
            searchInput.addEventListener("input", showSuggestions); // Trigger suggestions as user types
        </script>
    </body>
</html>
