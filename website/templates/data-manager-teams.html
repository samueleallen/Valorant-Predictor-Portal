    <!----- Java Script for Player Search ----->
        <script>
            const searchBox = document.querySelector(".search-box");
            const searchButton = document.querySelector(".search-icon");
            const cancelButton = document.querySelector(".cancel-icon");
            const searchInput = document.getElementById("player_input");
            const suggestions = document.getElementById("suggestions");

            searchButton.onclick =()=>{
                searchBox.classList.add("active");
                searchButton.classList.add("active");
                searchInput.classList.add("active");
                cancelButton.classList.add("active");
                searchInput.focus();

                if (searchInput.value != "") {
                    // searchData.classList.remove("active");
                    fetchPlayerStats(searchInput.value);
                    suggestions.innerHTML = "";
                }
            }
            cancelButton.onclick =()=> {
                searchBox.classList.remove("active");
                searchButton.classList.remove("active");
                searchInput.classList.remove("active");
                cancelButton.classList.remove("active");
                suggestions.classList.remove("active");
                searchInput.value = "";
            }

            // Function to fetch all players for autocomplete
            async function fetchPlayers() {
                try {
                    const res = await fetch(`http://localhost:3000/players`);
                    if (!res.ok) throw new Error("Failed to fetch players.");
                    const data = await res.json();
                    return data.map(p => p.player_name);
                } catch (err) {
                    console.error(err);
                    return [];
                }
            }

            // Filter and show suggestions
            async function showSuggestions() {
                // Fetch player list
                const allPlayers = await fetchPlayers();

                // Set query for player
                const query = searchInput.value.toLowerCase();
                suggestions.innerHTML = "";
                
                // If empty query, remove active status and return
                if (!query) {
                    suggestions.classList.remove("active");
                    return;
                }
                
                // Find top 5 players that match the input string
                const matches = allPlayers.filter(name => name.toLowerCase().includes(query)).slice(0, 5)

                
                matches.forEach(name => {
                    const li = document.createElement("li");
                    li.textContent = name;
                    li.classList.add("suggestion-item");
                    li.addEventListener("click", () => {
                        window.location.href = `/players/${encodeURIComponent(name)}`;
                        // searchInput.value = name;
                        // suggestions.innerHTML = "";
                        // suggestions.classList.remove("active");
                        // fetchPlayerStats(name);
                    });
                    suggestions.appendChild(li);
                });

                if (matches.length > 0) {
                    suggestions.classList.add("active");
                } else {
                    suggestions.classList.remove("active");
                }
            }

            searchInput.addEventListener("input", showSuggestions); // Trigger suggestions as user types

        </script>

    <!----- Java Script for Teams Table ----->
        <script>
            // Fetch Team and dynamically load table
            async function fetchTeamsTable() {
                try {
                    const res = await fetch(`http://localhost:3000/admin/teams`);
                    if (!res.ok) throw new Error("Could not load table.");
                    const data = await res.json();
                    const region = data.region_name;
                    const team = data.team_name;

                    const teamsDiv = document.getElementById("teams")

                    // Display stats
                    let htmlContent = `<h2>All Teams</h2>`;
                    
                        if (data && data.length > 0) {
                            // Get unique column headers
                            const headers = Object.keys(data[0])

                            // Build table HTML
                            htmlContent += '<div class="teams-table-wrapper">';
                            htmlContent += '<table>'
                            
                            // Table header
                            htmlContent += '<thead><tr>';
                            headers.forEach(header => {
                                // Clean up headers
                                const displayHeader = header.split('_').map(word => word.charAt().toUpperCase() + word.slice(1)).join(' ');
                                htmlContent += `<th>${displayHeader}</th>`;
                            });
                            htmlContent += '</tr></thead>';

                            // Table Body
                            htmlContent += '<tbody>';
                            data.forEach(dataRow => {
                                htmlContent += '<tr>';
                                // Loop through columns for each row
                                headers.forEach(header => {
                                    // Output data content for each cell
                                    htmlContent += `<td>${dataRow[header]}</td>`;
                                });
                                htmlContent += '</tr>';
                            });
                            // Close final wrappers
                            htmlContent += '</tbody>';
                            htmlContent += '</table>';
                            htmlContent += '</div>';
                        }
                    else {
                        console.error("Element with ID 'team' was not found.");
                    }
                    teamsDiv.innerHTML = htmlContent;

                } catch (err) {
                    console.error(err);
                    const teamsDiv = document.getElementById("teams")
                    if (teamsDiv) {
                        teamsDiv.innerHTML = `<p style="color:red;">${err.message}</p>`;
                    }
                    
                }
            }
            fetchTeamsTable();
        </script>

        <!----- Java Script for Form ----->
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                const operationRadios = document.querySelectorAll('input[name="operation"]');
                const submitButton = document.getElementById('submit-button');
                const regionNameBox = document.getElementById('region-name-box');
                const newRegionBox = document.getElementById('new-region-box');
                const teamBox = document.getElementById('team-name-box');
                const newTeamBox = document.getElementById('new-team-box');

                const form = document.querySelector('.form-container form');
                const regionNameInput = document.getElementById('region-name-input');
                const newRegionNameInput = document.getElementById('new-region-input');
                const teamNameInput = document.getElementById('team-name-input');
                const newTeamNameInput = document.getElementById('new-team-input');

                // Helper function for toggling visibility for a list of elements
                function toggleVisibility(elements, show) {
                    let action;

                    if (show) {
                        action = 'remove';
                    } else {action = 'add';}
                    elements.forEach(el => {
                        if (el) {el.classList[action]('hidden');}
                    });
                }
                // Function to update form based on selection of operation (Add, Update, or Remove)
                function updateForm() {
                    // Get currently selected operation
                    const selectedOperation = document.querySelector('input[name="operation"]:checked').value;

                    const allToggleableBoxes = [regionNameBox, teamBox, newTeamBox, newRegionBox];

                    // Reset the form state
                    toggleVisibility(allToggleableBoxes, true);
                    
                    // Reset required attributes
                    regionNameInput.required = false;
                    teamNameInput.required = false;
                    newRegionNameInput.required = false;
                    newTeamNameInput.required = false;

                    // Clear input of hidden fields
                    newRegionNameInput.value = '';
                    newTeamNameInput.value = '';

                    switch (selectedOperation) {
                        case 'Add':
                            // Only needs region name and team name visible
                            toggleVisibility([newRegionBox, newTeamBox], false); 
                            toggleVisibility([regionNameBox, teamBox], true);

                            regionNameInput.required = true;
                            teamNameInput.required = true;

                            submitButton.value = 'Add Team';
                            break;
                        case 'Update':
                            // Needs all buttons to be visible
                            submitButton.value = 'Update Team';

                            teamNameInput.required = true;
                            
                            break;
                        case 'Remove':
                            // Only needs region name and team name visible
                            toggleVisibility([newRegionBox, newTeamBox], false); 
                            toggleVisibility([regionNameBox, teamBox], true);

                            teamNameInput.required = true;
                            regionNameInput.required = true;

                            submitButton.value = 'Remove Team';
                            break;
                    }
                }

                operationRadios.forEach(radio => {
                    radio.addEventListener('change', updateForm);
                });

                updateForm();

                // Form Submission
                // Helper function for displaying status messages
                function displayStatus(message, isError = false) {
                    const teamsDiv = document.getElementById("teams");
                    if (teamsDiv) {
                        teamsDiv.insertAdjacentHTML('beforebegin', `<p id="status-message" style="color:${isError ? 'red' : 'green'}; font-weight: bold; margin-bottom: 10px;">${message}</p>`);
                    }
                    // Remove message after a few seconds
                    setTimeout(() => {
                        const statusMessage = document.getElementById('status-message');
                        if (statusMessage) statusMessage.remove();
                    }, 5000);
                }

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    // Get current operation (Add, update, or remove player)
                    const selectedOperation = document.querySelector('input[name="operation"]:checked').value;
                    let method;
                    let body = {};
                    let url = 'http://localhost:3000/admin/teams';

                    // Remove any old status messages
                    const oldStatus = document.getElementById('status-message');
                    if (oldStatus) oldStatus.remove();
                    
                    try {
                        if (selectedOperation == 'Add') {
                            body = {region_name: regionNameInput.value, team_name: teamNameInput.value};
                            method = 'POST';
                        }
                        else if (selectedOperation == 'Update') {
                            body = {new_region: newRegionNameInput.value || undefined, team_name: teamNameInput.value, new_team_name: newTeamNameInput.value || undefined};
                            method = 'PUT';
                        }
                        else if (selectedOperation == 'Remove') {
                            method = 'DELETE';
                            url = url + '/' + encodeURIComponent(teamNameInput.value);
                        }
                        
                        // Execute fetch request
                        const res = await fetch(url, {method: method, headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
                        const data = await res.json();

                        if (res.ok) {
                            displayStatus(`Success: ${data.message || 'Operation sucessfully completed.'}`, false);
                            fetchTeamsTable();
                        } else {
                            displayStatus(`Error: ${data.error || 'Operation could not be completed.'} - ${data.message || ''}`, true );
                        }
                    } catch (err) {
                        console.error("Could not make change to database.")
                    }
                });
            });
        </script>
