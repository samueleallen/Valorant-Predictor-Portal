<!DOCTYPE html>
<html>
    <head>
        <meta name = "viewport" content="with=device-width, initial-scale=1.0">
            <title>Valorant Esports Portal</title>
            <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
            <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,600;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
    </head>
    <body>
        <section class="data-management-page">
            <nav>
                <a href="{{ url_for('index') }}"><img src="{{url_for('static', filename='images/Valorant_logo.svg') }}"></a>
                <div class="nav-links" id="navLinks">
                    <i class="fa fa-times" onclick="hideMenu()"></i>
                    <ul>
                        <li><a href="{{ url_for('index') }}">HOME</a></li>
                        <li><a href="{{ url_for('teams') }}">TEAMS</a></li>
                        <li><a href="{{ url_for('matches') }}">MATCHES</a></li>
                        <li><a href="{{ url_for('standings') }}">STANDINGS</a></li>
                        <li><a href="{{ url_for('players') }}">PLAYERS</a></li>
                        <li><a href="{{ url_for('admin') }}">DATA MANAGEMENT</a></li>
                        <li class=search-bar-item>
                            <div class="search-box">
                                <input type="text" id="player_input" placeholder="Search Player IGN...">
                                <div class="search-icon">
                                    <i class="fas fa-search"></i>
                                </div>
                                <div class="cancel-icon">
                                    <i class="fas fa-times"></i>
                                </div>
                                <ul id="suggestions" class="suggestions-list"></ul>
                            </div>
                        </li>
                    </ul>
                </div>
                <i class="fa fa-bars" onclick="showMenu()"></i>
            </nav>

            <div class="text-box">
                <h1>Database Manager</h1>
                <p>Explore below to add, update, or remove data.
                </p>
                <a href="{{ url_for('admin_players') }}" class="hero-btn">Manage Players</a>
                <a href="{{ url_for('admin_teams') }}" class="hero-btn">Manage Teams</a>
            </div>

            <div class="player-stats-container">
                <div id="player-stats"></div>
            </div>
        </section>

    <!----- Java Script for Toggle Menu ----->
        <script>
            var navLinks = document.getElementById("navLinks");
            function showMenu(){
                navLinks.style.right = "-50px";
            }
            function hideMenu(){
                navLinks.style.right = "-200px";
            }

        </script>
    <!----- Java Script for Player Search ----->
        <script>
            const searchBox = document.querySelector(".search-box");
            const searchButton = document.querySelector(".search-icon");
            const cancelButton = document.querySelector(".cancel-icon");
            const searchInput = document.getElementById("player_input");
            const suggestions = document.getElementById("suggestions");
            const playerStatsDiv = document.getElementById("player-stats");

            searchButton.onclick =()=>{
                searchBox.classList.add("active");
                searchButton.classList.add("active");
                searchInput.classList.add("active");
                cancelButton.classList.add("active");
                searchInput.focus();

                if (searchInput.value != "") {
                    // searchData.classList.remove("active");
                    fetchPlayerStats(searchInput.value);
                    suggestions.innerHTML = "";
                }
            }
            cancelButton.onclick =()=> {
                searchBox.classList.remove("active");
                searchButton.classList.remove("active");
                searchInput.classList.remove("active");
                cancelButton.classList.remove("active");
                suggestions.classList.remove("active");
                searchInput.value = "";
            }

            // Function to fetch all players for autocomplete
            async function fetchPlayers() {
                try {
                    const res = await fetch(`http://localhost:3000/players`);
                    if (!res.ok) throw new Error("Failed to fetch players.");
                    const data = await res.json();
                    return data.map(p => p.player_name);
                } catch (err) {
                    console.error(err);
                    return [];
                }
            }

            // Filter and show suggestions
            async function showSuggestions() {
                // Fetch player list
                const allPlayers = await fetchPlayers();

                // Set query for player
                const query = searchInput.value.toLowerCase();
                suggestions.innerHTML = "";
                
                // If empty query, remove active status and return
                if (!query) {
                    suggestions.classList.remove("active");
                    return;
                }
                
                // Find top 5 players that match the input string
                const matches = allPlayers.filter(name => name.toLowerCase().includes(query)).slice(0, 5)

                
                matches.forEach(name => {
                    const li = document.createElement("li");
                    li.textContent = name;
                    li.classList.add("suggestion-item");
                    li.addEventListener("click", () => {
                        window.location.href = `/players/${encodeURIComponent(name)}`;
                        // searchInput.value = name;
                        // suggestions.innerHTML = "";
                        // suggestions.classList.remove("active");
                        // fetchPlayerStats(name);
                    });
                    suggestions.appendChild(li);
                });

                if (matches.length > 0) {
                    suggestions.classList.add("active");
                } else {
                    suggestions.classList.remove("active");
                }
            }

            searchInput.addEventListener("input", showSuggestions); // Trigger suggestions as user types
        </script>
    </body>
</html>
