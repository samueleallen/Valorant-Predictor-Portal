<!DOCTYPE html>
<html>
    <head>
        <meta name = "viewport" content="with=device-width, initial-scale=1.0">
            <title>Valorant Esports Portal</title>
            <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
            <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,600;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css">
    </head>
    <body>
        <section class="player-stats-page">
            <nav>
                <a href="{{ url_for('index') }}"><img src="{{url_for('static', filename='images/Valorant_logo.svg') }}"></a>
                <div class="nav-links" id="navLinks">
                    <i class="fa fa-times" onclick="hideMenu()"></i>
                    <ul>
                        <li><a href="{{ url_for('index') }}">HOME</a></li>
                        <li><a href="{{ url_for('teams') }}">TEAMS</a></li>
                        <li><a href="{{ url_for('matches') }}">MATCHES</a></li>
                        <li><a href="{{ url_for('standings') }}">STANDINGS</a></li>
                        <li><a href="{{ url_for('players') }}">PLAYERS</a></li>
                        <li><a href="{{ url_for('admin') }}">DATA MANAGEMENT</a></li>
                        <li class=search-bar-item>
                            <div class="search-box">
                                <input type="text" id="player_input" placeholder="Search Player IGN...">
                                <div class="search-icon">
                                    <i class="fas fa-search"></i>
                                </div>
                                <div class="cancel-icon">
                                    <i class="fas fa-times"></i>
                                </div>
                                <ul id="suggestions" class="suggestions-list"></ul>
                            </div>
                        </li>
                    </ul>
                </div>
                <i class="fa fa-bars" onclick="showMenu()"></i>
            </nav>

            <div class="player-stats-container">
                <div id="player-stats"></div>
            </div>
        </section>

    <!----- Java Script for Toggle Menu ----->
        <script>
            var navLinks = document.getElementById("navLinks");
            function showMenu(){
                navLinks.style.right = "-50px";
            }
            function hideMenu(){
                navLinks.style.right = "-200px";
            }

        </script>
    <!----- Java Script for Player Search ----->
        <script>
            const searchBox = document.querySelector(".search-box");
            const searchButton = document.querySelector(".search-icon");
            const cancelButton = document.querySelector(".cancel-icon");
            const searchInput = document.getElementById("player_input");
            const suggestions = document.getElementById("suggestions");
            const playerStatsDiv = document.getElementById("player-stats");

            searchButton.onclick =()=>{
                searchBox.classList.add("active");
                searchButton.classList.add("active");
                searchInput.classList.add("active");
                cancelButton.classList.add("active");
                searchInput.focus();

                if (searchInput.value != "") {
                    // searchData.classList.remove("active");
                    fetchPlayerStats(searchInput.value);
                    suggestions.innerHTML = "";
                }
            }
            cancelButton.onclick =()=> {
                searchBox.classList.remove("active");
                searchButton.classList.remove("active");
                searchInput.classList.remove("active");
                cancelButton.classList.remove("active");
                suggestions.classList.remove("active");
                searchInput.value = "";
            }

            // Function to fetch all players for autocomplete
            async function fetchPlayers() {
                try {
                    const res = await fetch(`http://localhost:3000/players`);
                    if (!res.ok) throw new Error("Failed to fetch players.");
                    const data = await res.json();
                    return data.map(p => p.player_name);
                } catch (err) {
                    console.error(err);
                    return [];
                }
            }

            // Filter and show suggestions
            async function showSuggestions() {
                // Fetch player list
                const allPlayers = await fetchPlayers();

                // Set query for player
                const query = searchInput.value.toLowerCase();
                suggestions.innerHTML = "";
                
                // If empty query, remove active status and return
                if (!query) {
                    suggestions.classList.remove("active");
                    return;
                }
                
                // Find top 5 players that match the input string
                const matches = allPlayers.filter(name => name.toLowerCase().includes(query)).slice(0, 5)

                
                matches.forEach(name => {
                    const li = document.createElement("li");
                    li.textContent = name;
                    li.classList.add("suggestion-item");
                    li.addEventListener("click", () => {
                        window.location.href = `/players/${encodeURIComponent(name)}`;
                        // searchInput.value = name;
                        // suggestions.innerHTML = "";
                        // suggestions.classList.remove("active");
                        // fetchPlayerStats(name);
                    });
                    suggestions.appendChild(li);
                });

                if (matches.length > 0) {
                    suggestions.classList.add("active");
                } else {
                    suggestions.classList.remove("active");
                }
            }

            // Fetch stats for player and dynamically load table
            async function fetchPlayerStats(playerName) {
                try {
                    const res = await fetch(`http://localhost:3000/player/${playerName}`);
                    if (!res.ok) throw new Error("Player not found.");
                    const data = await res.json();
                    const stats = data.stats;

                    // Display stats
                    let htmlContent = `<h2>${data.player_name} Stats`;
                    
                        if (stats && stats.length > 0) {
                            // Get unique column headers
                            const headers = Object.keys(stats[0])

                            // Build table HTML
                            htmlContent += '<div class="stats-table-wrapper">';
                            htmlContent += '<table>'
                            
                            // Table header
                            htmlContent += '<thead><tr>';
                            headers.forEach(header => {
                                // Clean up headers
                                const displayHeader = header.split('_').map(word => word.charAt().toUpperCase() + word.slice(1)).join(' ');
                                htmlContent += `<th>${displayHeader}</th>`;
                            });
                            htmlContent += '</tr></thead>';

                            // Table Body
                            htmlContent += '<tbody>';
                            stats.forEach(statRow => {
                                htmlContent += '<tr>';
                                // Loop through columns for each row
                                headers.forEach(header => {
                                    // Output data content for each cell
                                    htmlContent += `<td>${statRow[header]}</td>`;
                                });
                                htmlContent += '</tr>';
                            });
                            // Close final wrappers
                            htmlContent += '</tbody>';
                            htmlContent += '</table>';
                            htmlContent += '</div>';
                        }
                    else {
                        htmlContent += '<p>No stats available for this player.</p>';
                    }
                    playerStatsDiv.innerHTML = htmlContent;

                } catch (err) {
                    console.error(err);
                    playerStatsDiv.innerHTML = `<p style="color:red;">${err.message}</p>`;
                }
            }
            
            // Function to fetch player name from URL
            function getPlayerNameFromURL() {
                const path = window.location.pathname;
                const parts = path.split('/');
                const potentialPlayerName = parts[parts.length - 1];

                // Check for existence and make sure we aren't just on the /players page
                if (potentialPlayerName && potentialPlayerName != 'players') {
                    return decodeURIComponent(potentialPlayerName);
                }
                return null;
            }

            // Auto-load table
            const initialPlayerName = getPlayerNameFromURL();

            if (initialPlayerName) {
                // If we successfully found a player name in the URL, fetch the stats
                fetchPlayerStats(initialPlayerName);
                searchInput.value = initialPlayerName;
            }

            searchInput.addEventListener("input", showSuggestions); // Trigger suggestions as user types

        </script>
    </body>
</html>
