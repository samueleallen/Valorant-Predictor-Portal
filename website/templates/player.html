    <!----- Java Script for Player Search ----->
        <script>
            const searchBox = document.querySelector(".search-box");
            const searchButton = document.querySelector(".search-icon");
            const cancelButton = document.querySelector(".cancel-icon");
            const searchInput = document.getElementById("player_input");
            const suggestions = document.getElementById("suggestions");
            const playerStatsDiv = document.getElementById("player-stats");

            searchButton.onclick =()=>{
                searchBox.classList.add("active");
                searchButton.classList.add("active");
                searchInput.classList.add("active");
                cancelButton.classList.add("active");
                searchInput.focus();

                if (searchInput.value != "") {
                    searchData.classList.remove("active");
                    fetchPlayerStats(searchInput.value);
                    suggestions.innerHTML = "";
                }
            }
            cancelButton.onclick =()=> {
                searchBox.classList.remove("active");
                searchButton.classList.remove("active");
                searchInput.classList.remove("active");
                cancelButton.classList.remove("active");
                suggestions.classList.remove("active");
                searchInput.value = "";
            }

            // Function to fetch all players for autocomplete
            async function fetchPlayers() {
                try {
                    const res = await fetch(`http://localhost:3000/players`);
                    if (!res.ok) throw new Error("Failed to fetch players.");
                    const data = await res.json();
                    return data.map(p => p.player_name);
                } catch (err) {
                    console.error(err);
                    return [];
                }
            }

            // Filter and show suggestions
            async function showSuggestions() {
                // Fetch player list
                const allPlayers = await fetchPlayers();

                // Set query for player
                const query = searchInput.value.toLowerCase();
                suggestions.innerHTML = "";
                
                // If empty query, remove active status and return
                if (!query) {
                    suggestions.classList.remove("active");
                    return;
                }
                
                // Find top 5 players that match the input string
                const matches = allPlayers.filter(name => name.toLowerCase().includes(query)).slice(0, 5)

                
                matches.forEach(name => {
                    const li = document.createElement("li");
                    li.textContent = name;
                    li.classList.add("suggestion-item");
                    li.addEventListener("click", () => {
                        window.location.href = `/players/${encodeURIComponent(name)}`;
                        // searchInput.value = name;
                        // suggestions.innerHTML = "";
                        // suggestions.classList.remove("active");
                        // fetchPlayerStats(name);
                    });
                    suggestions.appendChild(li);
                });

                if (matches.length > 0) {
                    suggestions.classList.add("active");
                } else {
                    suggestions.classList.remove("active");
                }
            }

            // Fetch stats for player
            async function fetchPlayerStats(playerName) {
                try {
                    const res = await fetch(`http://localhost:3000/player/${playerName}`);
                    if (!res.ok) throw new Error("Player not found.");
                    const data = await res.json();

                    // Display stats
                    playerStatsDiv.innerHTML = `
                        <h2>${data.player_name}</h2>
                        ${data.stats.length ? `
                        <ul>
                            ${data.stats.map(stat => 
                                `<li>${Object.entries(stat).map(([key, value]) => `${key}: ${value}`).join(', ')}</li>`
                            ).join('')}
                        </ul>` : '<p>No stats available</p>'}
                    `;
                } catch (err) {
                    console.error(err);
                    playerStatsDiv.innerHTML = `<p style="color:red;">${err.message}</p>`;
                }
            }

            searchInput.addEventListener("input", showSuggestions); // Trigger suggestions as user types
             
        </script>

            // Function to handle toggling logic
            function toggleFilter(buttons, clickedButton) {
                buttons.forEach(btn => btn.classList.remove('active'));

                clickedButton.classList.add('active');
                
                // TODO: Add filter logic here
                   
            }

            // Attach listeners to matches buttons
            matchesFilterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    toggleFilter(matchesFilterButtons, button);

            // Attach listeners to standings buttons
